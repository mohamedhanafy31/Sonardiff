<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48" role="img" aria-label="SonarDiff">
  <title>SonarDiff</title>
  <defs>
    <style>
      .sd-pulse-outer {
        transform-box: fill-box;
        transform-origin: center;
        animation: sd-po 2.4s ease-out infinite;
      }
      .sd-pulse-inner {
        transform-box: fill-box;
        transform-origin: center;
        animation: sd-pi 2.4s ease-out infinite 0.65s;
      }
      @keyframes sd-po {
        0%   { transform: scale(1);    opacity: 1; }
        100% { transform: scale(1.45); opacity: 0; }
      }
      @keyframes sd-pi {
        0%   { transform: scale(1);    opacity: 0.65; }
        100% { transform: scale(1.22); opacity: 0; }
      }
    </style>
    <!-- Glow filter for the center dot -->
    <filter id="sd-dot-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow filter for the animated ring -->
    <filter id="sd-ring-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Sonar icon · center (24, 24) · ring radius 16 ── -->

  <!-- Static faint outer ring (rgba(6,182,212,0.2)) -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="#06B6D4" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Outer animated pulse ring -->
  <circle class="sd-pulse-outer" cx="24" cy="24" r="16" fill="none" stroke="#06B6D4" stroke-width="1.5" filter="url(#sd-ring-glow)"/>

  <!-- Inner animated pulse ring (delayed) -->
  <circle class="sd-pulse-inner" cx="24" cy="24" r="16" fill="none" stroke="#06B6D4" stroke-width="1"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="4.5" fill="#06B6D4" filter="url(#sd-dot-glow)"/>

  <!-- ── Wordmark · starts at x=52 (36 px icon + 13 px gap + 3 px optical padding) ── -->
  <!-- "Sonar" in foreground white, "Diff" in Electric Cyan -->
  <text
    x="53"
    y="24"
    dominant-baseline="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="22"
    letter-spacing="-0.66"
    fill="#F4F4F5"
  >Sonar<tspan fill="#06B6D4">Diff</tspan></text>

</svg>
